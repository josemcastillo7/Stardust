<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Settings')}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Account Settings</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${emailError}" class="alert alert-danger" th:text="${emailError}"></div>
    <div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>
    <div th:if="${param.saved}" class="alert alert-success">Settings saved.</div>

    <!-- Bio -->
    <div class="card mb-4">
        <div class="card-header">Bio</div>
        <div class="card-body">
            <form th:action="@{/action_update_bio}" method="post">
                <div class="form-group">
                    <textarea name="bio" class="form-control" rows="4" maxlength="300"
                              placeholder="Tell others a bit about yourself..."
                              th:text="${profile != null ? profile.bio : ''}"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Bio</button>
            </form>
        </div>
    </div>

    <!-- Email -->
    <div class="card mb-4">
        <div class="card-header">Email Address</div>
        <div class="card-body">
            <form th:action="@{/action_update_email}" method="post">
                <div class="form-group">
                    <input type="email" name="email" class="form-control"
                           th:value="${profile != null ? profile.email : ''}"
                           required />
                </div>
                <button type="submit" class="btn btn-primary">Update Email</button>
            </form>
        </div>
    </div>

    <!-- Password -->
    <div class="card mb-4">
        <div class="card-header">Change Password</div>
        <div class="card-body">
            <form th:action="@{/action_update_password}" method="post">
                <div class="form-group mb-2">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword" class="form-control" required />
                </div>
                <div class="form-group mb-2">
                    <label>New Password</label>
                    <input type="password" name="newPassword" class="form-control" required />
                    <small class="text-muted">6-40 characters, alphanumeric + !@#%&</small>
                </div>
                <button type="submit" class="btn btn-primary">Change Password</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
