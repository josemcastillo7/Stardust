<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout :: head('Sent Messages')}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Sent Messages</h2>
        <a th:href="@{/messages/compose}" class="btn btn-primary">Compose</a>
    </div>

    <div class="mb-2">
        <a th:href="@{/messages/inbox}" class="text-muted">Inbox</a>
    </div>

    <div th:if="${messages.isEmpty()}" class="text-muted mt-4">
        No sent messages.
    </div>

    <div class="list-group message-list" th:unless="${messages.isEmpty()}">
        <a th:each="msg : ${messages}"
           th:href="@{/messages/view(id=${msg.id})}"
           class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between">
                <span th:text="${msg.recipient.username}">recipient</span>
                <small class="text-muted" th:text="${msg.timeString}">time</small>
            </div>
            <span th:text="${msg.subject}">subject</span>
        </a>
    </div>

</div>
</body>
</html>
