<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout :: head('Compose Message')}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">

    <h2>Compose Message</h2>

    <div th:if="${!errors.isEmpty()}" class="alert alert-danger">
        <ul class="mb-0">
            <li th:each="err : ${errors}" th:text="${err}">Error</li>
        </ul>
    </div>

    <form th:action="@{/messages/compose}" method="post">
        <div class="form-group">
            <label>To</label>
            <input type="text" name="to" class="form-control" required
                   th:value="${toUsername}" placeholder="Username"/>
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" name="subject" class="form-control" required
                   maxlength="200" th:value="${subjectPrefill}" placeholder="Subject"/>
        </div>
        <div class="form-group">
            <label>Message</label>
            <input type="file" id="upload-input" class="d-none" multiple
                   accept="image/*,video/*"/>
            <input type="file" id="upload-folder-input" class="d-none" multiple webkitdirectory/>
            <div class="mb-1 d-flex flex-wrap align-items-center" style="gap:4px;">
                <div class="btn-group">
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Bold"
                            onclick="insertMd('msg-content','**','**','bold text')"><b>B</b></button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Italic"
                            onclick="insertMd('msg-content','_','_','italic text')"><em>I</em></button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" title="Underline"
                            onclick="insertMd('msg-content','<u>','</u>','underlined text')"><u>U</u></button>
                </div>
                <select class="form-control form-control-sm" style="width:auto" title="Font Size"
                        onchange="applySpan('msg-content','font-size',this.value);this.selectedIndex=0;">
                    <option value="">Size</option>
                    <option value="0.75em" style="font-size:0.75em">Small</option>
                    <option value="1em"    style="font-size:1em">Normal</option>
                    <option value="1.4em"  style="font-size:1.4em">Large</option>
                    <option value="1.8em"  style="font-size:1.8em">Huge</option>
                </select>
                <select class="form-control form-control-sm" style="width:auto" title="Font Style"
                        onchange="applySpan('msg-content','font-family',this.value);this.selectedIndex=0;">
                    <option value="">Font</option>
                    <option value="sans-serif" style="font-family:sans-serif">Sans-serif</option>
                    <option value="serif"      style="font-family:serif">Serif</option>
                    <option value="monospace"  style="font-family:monospace">Monospace</option>
                    <option value="cursive"    style="font-family:cursive">Cursive</option>
                </select>
                <button type="button" class="btn btn-sm btn-outline-secondary" title="Upload files"
                        onclick="triggerUpload('msg-content','files')">&#128206; Files</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" title="Upload from folder"
                        onclick="triggerUpload('msg-content','folder')">&#128193; Folder</button>
            </div>
            <textarea id="msg-content" name="content" class="form-control mt-1" rows="8"
                      required maxlength="4999"
                      placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
        <a th:href="@{/messages/inbox}" class="btn btn-secondary ml-2">Cancel</a>
    </form>

</div>
<script>
function insertMd(taId, before, after, placeholder) {
    const ta = document.getElementById(taId);
    const start = ta.selectionStart, end = ta.selectionEnd;
    const selected = ta.value.substring(start, end);
    const insertion = before + (selected || placeholder) + after;
    ta.value = ta.value.substring(0, start) + insertion + ta.value.substring(end);
    ta.focus();
    ta.selectionStart = start + before.length;
    ta.selectionEnd   = start + before.length + (selected || placeholder).length;
}
function applySpan(taId, property, value) {
    if (!value) return;
    const ta = document.getElementById(taId);
    const start = ta.selectionStart, end = ta.selectionEnd;
    const selected = ta.value.substring(start, end) || 'text';
    const tag = '<span style="' + property + ':' + value + '">' + selected + '</span>';
    ta.value = ta.value.substring(0, start) + tag + ta.value.substring(end);
    ta.focus();
}

const csrf    = document.querySelector('meta[name="_csrf"]')?.content;
const csrfHdr = document.querySelector('meta[name="_csrf_header"]')?.content;

function insertAtCursor(taId, text) {
    const ta = document.getElementById(taId);
    const pos = ta.selectionStart;
    ta.value = ta.value.substring(0, pos) + text + ta.value.substring(pos);
    ta.focus();
}
function sendUpload(taId, file) {
    const fd = new FormData();
    fd.append('file', file);
    const headers = {};
    if (csrf && csrfHdr) headers[csrfHdr] = csrf;
    fetch('/upload', { method: 'POST', body: fd, headers })
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert(data.error); return; }
            const markup = data.type === 'video'
                ? '<video controls src="' + data.url + '"></video>\n'
                : '![](' + data.url + ')\n';
            insertAtCursor(taId, markup);
        })
        .catch(() => alert('Upload failed.'));
}
function triggerUpload(taId, mode) {
    const input = document.getElementById(
        mode === 'folder' ? 'upload-folder-input' : 'upload-input');
    input.onchange = () => {
        Array.from(input.files).forEach(f => sendUpload(taId, f));
        input.value = '';
    };
    input.click();
}
document.getElementById('msg-content').addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
        if (item.kind === 'file' && (item.type.startsWith('image/') || item.type.startsWith('video/'))) {
            e.preventDefault();
            sendUpload('msg-content', item.getAsFile());
            break;
        }
    }
});
</script>
</body>
</html>
