<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>
<nav th:fragment="header" class="navbar navbar-dark forum-header">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}" th:text="${siteName}">Schooner</a>
        <div class="navbar-nav flex-row">
            <a class="nav-link text-white mr-3" th:href="@{/}">Subforum Index</a>
            <div th:if="${isLoggedIn}" class="dropdown ml-3">
                <button class="btn p-0 border-0 bg-transparent d-flex align-items-center"
                        id="profileDropdown" data-toggle="dropdown"
                        aria-haspopup="true" aria-expanded="false"
                        style="cursor:pointer; gap:8px;">
                    <!-- Unread badge on messages icon -->
                    <span th:if="${unreadCount > 0}"
                          class="badge badge-danger"
                          style="position:absolute; transform:translate(18px,-8px); font-size:10px;"
                          th:text="${unreadCount}"></span>
                    <!-- Avatar circle with first letter of username -->
                    <span class="rounded-circle d-flex align-items-center justify-content-center text-white font-weight-bold"
                          th:text="${#strings.toUpperCase(#strings.substring(currentUser, 0, 1))}"
                          style="width:36px; height:36px; background:#6f42c1; font-size:16px; flex-shrink:0;">
                    </span>
                    <span class="text-white" th:text="${currentUser}">user</span>
                    <span class="text-white" style="font-size:10px;">&#9660;</span>
                </button>
                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="profileDropdown">
                    <h6 class="dropdown-header" th:text="'Signed in as ' + ${currentUser}"></h6>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" th:href="@{/messages/inbox}">
                        Messages
                        <span th:if="${unreadCount > 0}" class="badge badge-danger ml-1" th:text="${unreadCount}"></span>
                    </a>
                    <a class="dropdown-item" th:href="@{/settings}">Settings</a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/action_logout}" method="post" class="m-0">
                        <button type="submit" class="dropdown-item text-danger">Logout</button>
                    </form>
                </div>
            </div>
            <div th:if="${!isLoggedIn}">
                <a class="nav-link text-white d-inline" th:href="@{/loginform}">Login / Register</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
