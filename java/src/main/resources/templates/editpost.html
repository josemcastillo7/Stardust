<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Post')}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Edit Post</h2>
    <form th:action="@{/action_edit_post}" method="post">
        <input type="hidden" name="postId" th:value="${post.id}" />
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required
                   minlength="5" maxlength="139" th:value="${post.title}" />
        </div>
        <div class="form-group mt-2">
            <label>Content</label>
            <div class="mb-1 btn-toolbar" role="toolbar">
                <div class="btn-group mr-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('**','**','bold text')"><b>B</b></button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('_','_','italic text')"><i>I</i></button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('~~','~~','strikethrough')"><s>S</s></button>
                </div>
                <div class="btn-group mr-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('# ','','Heading')">H1</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('## ','','Heading')">H2</button>
                </div>
                <div class="btn-group mr-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('`','`','code')">Code</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('```\n','\n```','code here')">&#123;&#125;</button>
                </div>
                <div class="btn-group mr-1">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('- ','','list item')">&#8226; List</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('[','](url)','link text')">Link</button>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="togglePreview()">Preview</button>
                </div>
            </div>
            <div class="row mt-1">
                <div class="col" id="editor-col">
                    <textarea id="content" name="content" class="form-control" rows="10" required
                              minlength="11" maxlength="4999"
                              oninput="schedulePreview()"
                              th:text="${post.content}"></textarea>
                </div>
                <div class="col d-none" id="preview-col">
                    <div id="preview-box" class="border rounded p-3 bg-white" style="min-height:230px;overflow-y:auto;"></div>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a th:href="@{/viewpost(post=${post.id})}" class="btn btn-secondary ml-2">Cancel</a>
        </div>
    </form>
</div>

<script>
function insertMd(before, after, placeholder) {
    const ta = document.getElementById('content');
    const start = ta.selectionStart, end = ta.selectionEnd;
    const selected = ta.value.substring(start, end);
    const insertion = before + (selected || placeholder) + after;
    ta.value = ta.value.substring(0, start) + insertion + ta.value.substring(end);
    ta.focus();
    ta.selectionStart = start + before.length;
    ta.selectionEnd   = start + before.length + (selected || placeholder).length;
    schedulePreview();
}
let previewVisible = false, previewTimer = null;
function togglePreview() {
    previewVisible = !previewVisible;
    document.getElementById('editor-col').classList.toggle('col-6', previewVisible);
    document.getElementById('preview-col').classList.toggle('d-none', !previewVisible);
    if (previewVisible) refreshPreview();
}
function schedulePreview() {
    if (!previewVisible) return;
    clearTimeout(previewTimer);
    previewTimer = setTimeout(refreshPreview, 400);
}
function refreshPreview() {
    const raw = document.getElementById('content').value;
    fetch('/action_preview', { method:'POST', headers:{'Content-Type':'text/plain'}, body:raw })
        .then(r => r.text())
        .then(html => {
            const box = document.getElementById('preview-box');
            box.innerHTML = html || '<span class="text-muted">Nothing to preview yet.</span>';
            box.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        });
}
</script>
</body>
</html>
