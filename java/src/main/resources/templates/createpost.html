<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout :: head('Create Post')}"></head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container mt-4">
    <h2>Create Post in <span th:text="${subforum.title}">Forum</span></h2>
    <div th:if="${!errors.isEmpty()}" class="alert alert-danger">
        <ul class="mb-0">
            <li th:each="err : ${errors}" th:text="${err}">Error</li>
        </ul>
    </div>
    <form th:action="@{/action_post(sub=${subforum.id})}" method="post">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required
                   minlength="5" maxlength="139"/>
        </div>
        <div class="form-group">
            <label>Content</label>

            <!-- TOOLBAR -->
            <div class="mb-1">
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('**','**','bold text')"><b>B</b></button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('_','_','italic text')"><i>I</i></button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('`','`','code')">Code</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('# ','','Heading')">H1</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('- ','','list item')">List</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertMd('[','](url)','link text')">Link</button>
            </div>

            <textarea id="content" name="content" class="form-control" rows="8" required
                      minlength="11" maxlength="4999"></textarea>
            <small class="form-text text-muted mt-1">
                Markdown supported: <code>**bold**</code>, <code>_italic_</code>,
                <code>`code`</code>, <code># Heading</code>, <code>- list item</code>
            </small>
        </div>
        <button type="submit" class="btn btn-primary">Post</button>
        <a th:href="@{/subforum(sub=${subforum.id})}" class="btn btn-secondary ml-2">Cancel</a>
    </form>
</div>

<script>
function insertMd(before, after, placeholder) {
    const textarea = document.getElementById('content');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const selected = textarea.value.substring(start, end);
    const insertion = before + (selected || placeholder) + after;
    textarea.value = textarea.value.substring(0, start) + insertion + textarea.value.substring(end);
    textarea.focus();
    textarea.selectionStart = start + before.length;
    textarea.selectionEnd = start + before.length + (selected || placeholder).length;
}
</script>

</body>
</html>
